<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>Calculadora</h1>
        <label for="number1">
            <input class="first-valor" type=" text" placeholder="Digite o 1º numero">
        </label>
        <select id="operation">
            <option value="">Selecione uma operação</option>
            <option value="raiz">Raiz quadrada</option>
            <option value="sum">Adição</option>
            <option value="subtract">Subtração</option>
            <option value="multipli">Multiplição</option>
            <option value="divide">Divisão</option>
        </select>
        <label for="number2">
            <input class="second-valor" type=" text" placeholder="Digite o 2º numero">
        </label>
        <button>Calcular</button>
        <span></span>
    </div>
    <script src="script.js"></script>
</body>
</html>
