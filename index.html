<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/calculadora.png" type="image/x-icon">
    <title>Calculadora</title>
</head>
<body>
    <div class="container">
        <h1 class="titulo">Operações</h1>
        <label for="number1">
            <input class="first-valor" type="number" placeholder="Digite o 1º numero...">
            <p id="messageErro"></p>
        </label>
        <select id="operation">
            <option class="" value="">Selecione uma operação</option>
            <option value="age">Descubra sua idade</option>
            <option value="char">Contagem de letras</option>
            <option value="raiz">Raiz quadrada</option>
            <option value="even">Impar ou Par ?</option>
            <option value="sum">Adição</option>
            <option value="subtract">Subtração</option>
            <option value="multipli">Multiplição</option>
            <option value="divide">Divisão</option>
        </select>
        <label for="number2">
            <input class="second-valor" type="number" placeholder="Agora digite o 2º numero...">
        </label>
        <button>Calcular</button>
        <span></span>
    </div>
    <script src="script.js"></script>
</body>
</html>
